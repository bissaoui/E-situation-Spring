spring.config.import=optional:file:.env[.properties]
spring.application.name=situation-app

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${PORT:${SERVER_PORT:8080}}

security.rate-limit.max-requests-per-minute=${RATE_LIMIT_PER_MINUTE:120}
security.rate-limit.auth-max-requests-per-minute=${AUTH_RATE_LIMIT_PER_MINUTE:10}
security.auth.max-failed-attempts=${AUTH_MAX_FAILED_ATTEMPTS:5}
security.auth.lock-minutes=${AUTH_LOCK_MINUTES:15}
security.password.min-length=${PASSWORD_MIN_LENGTH:12}
security.mfa.issuer=${MFA_ISSUER:E-Situation}
security.data.encryption.key=${DATA_ENCRYPTION_KEY:}
security.data.encryption.migrate-on-startup=${DATA_ENCRYPTION_MIGRATE_ON_STARTUP:true}
security.jwt.mfa-pending-expiration-seconds=${JWT_MFA_PENDING_EXPIRATION_SECONDS:300}
security.refresh-token.expiration-seconds=${REFRESH_TOKEN_EXPIRATION_SECONDS:604800}
security.refresh-token.cleanup-cron=${REFRESH_TOKEN_CLEANUP_CRON:0 15 3 * * *}
app.seed.admin-password=${APP_ADMIN_PASSWORD:}
app.seed.user-password=${APP_USER_PASSWORD:}
app.seed.dg-password=${APP_DG_PASSWORD:}
app.seed.daf-password=${APP_DAF_PASSWORD:}
app.seed.ddza-password=${APP_DDZA_PASSWORD:}
app.seed.ddzo-password=${APP_DDZO_PASSWORD:}
app.seed.require-configured-passwords=${APP_REQUIRE_CONFIGURED_SEED_PASSWORDS:true}
security.jwt.secret=${JWT_SECRET:}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:900}
azure.client-id=${AZURE_CLIENT_ID:}
azure.client-secret=${AZURE_CLIENT_SECRET:}
azure.tenant-id=${AZURE_TENANT_ID:}
onedrive.user-email=${ONEDRIVE_USER_EMAIL:}
onedrive.file-path=${ONEDRIVE_FILE_PATH:}
onedrive.folder-path=${ONEDRIVE_FOLDER_PATH:}

be.files.base-path=${BE_FILES_BASE_PATH:}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://172.16.2.14:*,http://172.16.2.35:*,http://172.16.2.40:*}
app.batch.be-watch.enabled=true
app.batch.be-watch.fixed-delay-ms=180000
app.batch.be-watch.source=${BE_IMPORT_SOURCE:local}
app.batch.be-watch.directory=${be.files.base-path:}
app.batch.be-watch.file-prefix=BE-2026
