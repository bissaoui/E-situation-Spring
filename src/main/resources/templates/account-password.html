<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        .container { max-width: 520px; margin: 2rem auto; }
        input { width: 100%; box-sizing: border-box; padding: 0.6rem; margin-top: 0.2rem; margin-bottom: 0.8rem; }
        button { padding: 0.6rem 1rem; }
        .error { color: #b00020; }
        .ok { color: #0b7a2f; }
        .actions { margin-top: 0.8rem; display: flex; gap: 0.8rem; align-items: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>Change Password</h1>

    <p class="ok" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p class="error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>

    <form th:action="@{/account/password}" th:object="${passwordForm}" method="post">
        <label for="currentPassword">Current password</label>
        <input id="currentPassword" th:field="*{currentPassword}" type="password" required>
        <p class="error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></p>

        <label for="newPassword">New password</label>
        <input id="newPassword" th:field="*{newPassword}" type="password" required>
        <p class="error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></p>

        <label for="confirmNewPassword">Confirm new password</label>
        <input id="confirmNewPassword" th:field="*{confirmNewPassword}" type="password" required>
        <p class="error" th:if="${#fields.hasErrors('confirmNewPassword')}" th:errors="*{confirmNewPassword}"></p>

        <div class="actions">
            <button type="submit">Update Password</button>
            <a th:href="@{/situations}">Back to situations</a>
        </div>
    </form>
</div>
</body>
</html>
