<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container narrow">
    <h1>Sign in</h1>
    <div th:if="${param.error}" class="error">Invalid username or password</div>
    <div th:if="${param.logout}">You have been logged out.</div>
    <div class="notice small">
        Les donnees saisies ici sont utilisees pour l'authentification, la securite des acces et la journalisation des operations sensibles.
        <a th:href="@{/privacy}">Voir la notice de confidentialite</a>
    </div>
    <form th:action="@{/login}" method="post">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
