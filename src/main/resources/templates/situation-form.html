<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Situation</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container">
<h1>Create Situation</h1>

<div class="notice small">
    Les donnees saisies dans ce formulaire sont utilisees uniquement pour la gestion des situations administratives et financieres autorisees.
    <a th:href="@{/privacy}">Notice de confidentialite</a>
</div>

<form th:action="@{/situations}" th:object="${situation}" method="post">
    <div class="grid">
        <input th:field="*{beneficiaire}" placeholder="BENEFICAIRE" required>
        <input th:field="*{be}" placeholder="BE">
        <input th:field="*{dateOp}" type="date" placeholder="DATE">
        <input th:field="*{numeroOv}" placeholder="OV">
        <input th:field="*{cheque}" placeholder="CHEQUE">
        <input th:field="*{montantOvCheque}" type="number" step="0.01" placeholder="MONTANT_OV/CHEQUE">
        <input th:field="*{budget}" placeholder="BUDGET">
        <input th:field="*{rubriqueBudg}" placeholder="Rubrique_budg">
        <input th:field="*{numeroOp}" placeholder="N°_OP">
        <input th:field="*{montantOp}" type="number" step="0.01" placeholder="Montant_OP">
        <input th:field="*{objetDepense}" placeholder="Objet_dépense">
        <input th:field="*{anneeOrigine}" placeholder="ANNEE_D'ORIGINE">
        <input th:field="*{situation}" placeholder="Situation">
        <input th:field="*{dateVirement}" type="date" placeholder="Date_Virement">
        <input th:field="*{projet}" placeholder="Projet">
        <input th:field="*{beUrl}" placeholder="BE cloud URL (https://...)">
    </div>

    <div>
        <button type="submit">Save</button>
        <a th:href="@{/situations}">Cancel</a>
    </div>
</form>
</div>
</body>
</html>
